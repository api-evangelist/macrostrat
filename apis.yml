    name: Macrostrat API
    description: >-
      The Macrostrat API exposes geological data including columns, units,
      sections, fossils, geologic maps, paleogeography reconstructions,
      measurements, age models, and cartography services. It is linked to the
      xDD digital library and machine reading system.
