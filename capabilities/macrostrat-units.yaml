naftiko: 1.0.0-alpha2
info:
  label: Macrostrat API — Units
  description: 'Macrostrat API — Units. 1 operations. Lead operation: Search units. Self-contained Naftiko capability covering
    one Macrostrat business surface.'
  tags:
  - Macrostrat
  - Units
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MACROSTRAT_API_KEY: MACROSTRAT_API_KEY
capability:
  consumes:
  - type: http
    namespace: macrostrat-units
    baseUri: https://macrostrat.org/api/v2
    description: Macrostrat API — Units business capability. Self-contained, no shared references.
    resources:
    - name: units
      path: /units
      operations:
      - name: getunits
        method: GET
        description: Search units
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: query
          type: string
        - name: interval_name
          in: query
          type: string
        - name: lith
          in: query
          type: string
  exposes:
  - type: rest
    namespace: macrostrat-units-rest
    port: 8080
    description: REST adapter for Macrostrat API — Units. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/units
      name: units
      description: REST surface for units.
      operations:
      - method: GET
        name: getunits
        description: Search units
        call: macrostrat-units.getunits
        with:
          format: rest.format
          interval_name: rest.interval_name
          lith: rest.lith
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: macrostrat-units-mcp
    port: 9090
    transport: http
    description: MCP adapter for Macrostrat API — Units. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: search-units
      description: Search units
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: macrostrat-units.getunits
      with:
        format: tools.format
        interval_name: tools.interval_name
        lith: tools.lith
      outputParameters:
      - type: object
        mapping: $.
