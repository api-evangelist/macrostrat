naftiko: 1.0.0-alpha2
info:
  label: Macrostrat API — Definitions
  description: 'Macrostrat API — Definitions. 1 operations. Lead operation: Standard definitions. Self-contained Naftiko capability
    covering one Macrostrat business surface.'
  tags:
  - Macrostrat
  - Definitions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MACROSTRAT_API_KEY: MACROSTRAT_API_KEY
capability:
  consumes:
  - type: http
    namespace: macrostrat-definitions
    baseUri: https://macrostrat.org/api/v2
    description: Macrostrat API — Definitions business capability. Self-contained, no shared references.
    resources:
    - name: defs
      path: /defs
      operations:
      - name: getdefs
        method: GET
        description: Standard definitions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: macrostrat-definitions-rest
    port: 8080
    description: REST adapter for Macrostrat API — Definitions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/defs
      name: defs
      description: REST surface for defs.
      operations:
      - method: GET
        name: getdefs
        description: Standard definitions
        call: macrostrat-definitions.getdefs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: macrostrat-definitions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Macrostrat API — Definitions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: standard-definitions
      description: Standard definitions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: macrostrat-definitions.getdefs
      outputParameters:
      - type: object
        mapping: $.
