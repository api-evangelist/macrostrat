naftiko: 1.0.0-alpha2
info:
  label: Macrostrat API — Columns
  description: 'Macrostrat API — Columns. 1 operations. Lead operation: Search columns. Self-contained Naftiko capability
    covering one Macrostrat business surface.'
  tags:
  - Macrostrat
  - Columns
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MACROSTRAT_API_KEY: MACROSTRAT_API_KEY
capability:
  consumes:
  - type: http
    namespace: macrostrat-columns
    baseUri: https://macrostrat.org/api/v2
    description: Macrostrat API — Columns business capability. Self-contained, no shared references.
    resources:
    - name: columns
      path: /columns
      operations:
      - name: getcolumns
        method: GET
        description: Search columns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: query
          type: string
        - name: lat
          in: query
          type: number
        - name: lng
          in: query
          type: number
        - name: age
          in: query
          type: number
  exposes:
  - type: rest
    namespace: macrostrat-columns-rest
    port: 8080
    description: REST adapter for Macrostrat API — Columns. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/columns
      name: columns
      description: REST surface for columns.
      operations:
      - method: GET
        name: getcolumns
        description: Search columns
        call: macrostrat-columns.getcolumns
        with:
          format: rest.format
          lat: rest.lat
          lng: rest.lng
          age: rest.age
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: macrostrat-columns-mcp
    port: 9090
    transport: http
    description: MCP adapter for Macrostrat API — Columns. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: search-columns
      description: Search columns
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: macrostrat-columns.getcolumns
      with:
        format: tools.format
        lat: tools.lat
        lng: tools.lng
        age: tools.age
      outputParameters:
      - type: object
        mapping: $.
