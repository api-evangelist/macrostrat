naftiko: 1.0.0-alpha2
info:
  label: Macrostrat API — Fossils
  description: 'Macrostrat API — Fossils. 1 operations. Lead operation: Search fossils. Self-contained Naftiko capability
    covering one Macrostrat business surface.'
  tags:
  - Macrostrat
  - Fossils
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MACROSTRAT_API_KEY: MACROSTRAT_API_KEY
capability:
  consumes:
  - type: http
    namespace: macrostrat-fossils
    baseUri: https://macrostrat.org/api/v2
    description: Macrostrat API — Fossils business capability. Self-contained, no shared references.
    resources:
    - name: fossils
      path: /fossils
      operations:
      - name: getfossils
        method: GET
        description: Search fossils
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: macrostrat-fossils-rest
    port: 8080
    description: REST adapter for Macrostrat API — Fossils. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/fossils
      name: fossils
      description: REST surface for fossils.
      operations:
      - method: GET
        name: getfossils
        description: Search fossils
        call: macrostrat-fossils.getfossils
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: macrostrat-fossils-mcp
    port: 9090
    transport: http
    description: MCP adapter for Macrostrat API — Fossils. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: search-fossils
      description: Search fossils
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: macrostrat-fossils.getfossils
      outputParameters:
      - type: object
        mapping: $.
