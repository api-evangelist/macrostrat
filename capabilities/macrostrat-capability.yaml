naftiko: 1.0.0-alpha2
info:
  label: Macrostrat API
  description: Macrostrat is a platform for the aggregation and distribution of geological data relevant to the spatial and
    temporal distribution of sedimentary, igneous, and metamorphic rocks as well as data extracted from them. The API provides
    programmatic access to columns, units, fossils, geologic maps, paleogeography, measurements, and statistics.
  tags:
  - Macrostrat
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: macrostrat
    baseUri: https://macrostrat.org/api/v2
    description: Macrostrat API HTTP API.
    resources:
    - name: columns
      path: /columns
      operations:
      - name: getcolumns
        method: GET
        description: Search columns
        inputParameters:
        - name: format
          in: query
          type: string
        - name: lat
          in: query
          type: number
        - name: lng
          in: query
          type: number
        - name: age
          in: query
          type: number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sections
      path: /sections
      operations:
      - name: getsections
        method: GET
        description: Summarize sections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: units
      path: /units
      operations:
      - name: getunits
        method: GET
        description: Search units
        inputParameters:
        - name: format
          in: query
          type: string
        - name: interval_name
