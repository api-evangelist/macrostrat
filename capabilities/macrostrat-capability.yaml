    - name: paleogeography
      path: /paleogeography
      operations:
      - name: getpaleogeography
        method: GET
        description: Get paleogeography reconstructions
        inputParameters:
        - name: age
          in: query
          type: number
        outputRawFormat: json
        outputParameters:
